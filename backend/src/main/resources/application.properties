spring.application.name=fonamif-backend

# Database Configuration
# Fallback to H2 for local development, use environment variables for production
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/fonamif_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false

# Server
server.port=8080

# JWT Secret
jwt.secret=${BEZCODER_APP_JWTSECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
jwt.expiration=86400000

# Jackson - avoid infinite recursion with JPA relations
spring.jackson.serialization.fail-on-empty-beans=false
