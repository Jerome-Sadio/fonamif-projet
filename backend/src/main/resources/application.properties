spring.application.name=fonamif-backend

# Database Configuration - H2 (for development/demo)
# For PostgreSQL (production), uncomment and configure:
# spring.datasource.url=jdbc:postgresql://localhost:5432/fonamif_db
# spring.datasource.username=postgres
# spring.datasource.password=password
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Using H2 file-based for immediate run capability
spring.datasource.url=jdbc:h2:file:./data/fonamif_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate - create-drop to reset schema on restart (use 'update' in production)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Server
server.port=8080

# JWT Secret (In production, use environment variable)
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expiration=86400000

# Jackson - avoid infinite recursion with JPA relations
spring.jackson.serialization.fail-on-empty-beans=false
